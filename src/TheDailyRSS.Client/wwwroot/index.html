<!DOCTYPE html>
<html lang="en" data-theme="newsprint" data-font="ptserif" data-density="balanced">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Daily RSS</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;0,6..72,700;1,6..72,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <meta name="theme-color" content="#f4e9cf" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="TheDailyRSS.Client.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
    <script>
        window.tdrDownload = (filename, text, mime) => {
            const blob = new Blob([text], { type: mime || 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename;
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
        };

        // Forward wheel scrolls over the empty side gutters into the centre column,
        // so a scroll started outside the 1100px shell still moves the news.
        window.addEventListener('wheel', (e) => {
            if (e.ctrlKey) return; // leave pinch-zoom alone
            const main = document.querySelector('.tdr-main');
            if (!main) return;
            if (e.target.closest('.tdr-main, .tdr-sidebar')) return; // real scroll regions handle themselves
            main.scrollTop += e.deltaY;
            e.preventDefault();
        }, { passive: false });

        // Global F5 / "r" → in-place refresh (handled by Blazor, not a full page reload).
        window.tdrHotkeys = {
            ref: null,
            handler: null,
            register: (dotnetRef) => {
                window.tdrHotkeys.ref = dotnetRef;
                window.tdrHotkeys.handler = (e) => {
                    const t = e.target;
                    const typing = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
                    const isRefresh = e.key === 'F5' || (e.key === 'r' && !typing && !e.ctrlKey && !e.metaKey && !e.altKey);
                    if (!isRefresh) return;
                    e.preventDefault();
                    dotnetRef.invokeMethodAsync('OnRefreshHotkey');
                };
                window.addEventListener('keydown', window.tdrHotkeys.handler, true);
            },
            unregister: () => {
                if (window.tdrHotkeys.handler)
                    window.removeEventListener('keydown', window.tdrHotkeys.handler, true);
                window.tdrHotkeys.handler = null;
                window.tdrHotkeys.ref = null;
            }
        };
    </script>
</head>

<body>
    <div id="app">
        <div class="tdr-splash">
            <div class="tdr-splash-mark">The Daily RSS</div>
            <div class="tdr-splash-sub">— setting the type —</div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
