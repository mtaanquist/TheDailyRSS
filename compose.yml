services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: thedailyrss
      POSTGRES_USER: thedailyrss
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me-in-prod}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thedailyrss -d thedailyrss"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=thedailyrss;Username=thedailyrss;Password=${DB_PASSWORD:-change-me-in-prod}"
      # Edition cut-off timezone (IANA). Articles are grouped by calendar day in this zone.
      Feeds__EditionTimeZone: "${EDITION_TZ:-UTC}"
      Feeds__RefreshIntervalMinutes: "${REFRESH_MINUTES:-20}"
      # Optional: pin a JWT signing key. Left blank, one is generated and persisted under /data.
      Jwt__Key: "${JWT_KEY:-}"
    # The app serves plain HTTP here; put a TLS-terminating reverse proxy in front for HTTPS (required for
    # passkeys/WebAuthn). The proxy must forward X-Forwarded-Proto and X-Forwarded-Host so the app sees the
    # public origin it must verify passkey assertions against.
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - app-data:/data

volumes:
  db-data:
  app-data:
